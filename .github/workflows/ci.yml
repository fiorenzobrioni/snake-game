name: Continuous Integration

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # A single Gradle invocation shares the task graph: assembleDebug
      # compiles the app (the real "does it build?" check), the unit tests
      # exercise the game/ model, and lintDebug runs Android lint.
      - name: Assemble debug APK, run unit tests and lint
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Test & Lint Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results-*.html
          retention-days: 7
